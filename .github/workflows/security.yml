# DevSecOps security pipeline
# M1: lint + test job (green on main)
# M2: OPA policy unit tests + conftest gate over committed SARIF fixtures (offline)
# M3: security-gates — 4 live scanners → SARIF → conftest (sole enforcement point)
# M4: SBOM — Syft CycloneDX of the built image, uploaded as a build artifact (evidence)

name: security

on:
  push:
    branches: ["main", "demo/**", "feat/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint and test ──────────────────────────────────────────────────────────
  # Runs on every push and PR. Must be green on main.
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt ruff pytest
          pip install -e .

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-not-for-production
        run: pytest -q

  # ── OPA/Rego policy unit tests ─────────────────────────────────────────────
  # opa test policy/ — the deterministic, offline core. See docs/DECISIONS.md
  # ADR-009 for the pinned-version + checksum-verification rationale.
  opa-policy-tests:
    name: OPA policy unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install OPA (pinned v1.18.2, checksum-verified)
        run: |
          set -euo pipefail
          OPA_VERSION=v1.18.2
          ASSET=opa_linux_amd64_static
          # --fail: a 4xx/5xx from the release CDN must abort, not silently save an
          # HTML error page that then fails checksum verification with a misleading
          # "no properly formatted checksum lines" error. --retry rides out transient
          # CDN blips. See docs/DECISIONS.md ADR-010.
          DL="curl --fail --retry 3 --retry-delay 2 --retry-all-errors -sSL"
          $DL -o "${ASSET}" "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/${ASSET}"
          $DL -o "${ASSET}.sha256" "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"
          chmod +x "${ASSET}"
          sudo mv "${ASSET}" /usr/local/bin/opa
          opa version

      - name: Run opa test
        run: opa test policy/ -v

  # ── conftest gate over committed SARIF fixtures (offline) ──────────────────
  # No live scanners, no network calls in the policy evaluation itself — proves
  # the decision point works before M3 wires any real scanner.
  conftest-fixtures:
    name: conftest gate (offline fixtures)
    runs-on: ubuntu-latest
    needs: opa-policy-tests
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install conftest (pinned v0.68.2, checksum-verified)
        run: |
          set -euo pipefail
          CONFTEST_VERSION=0.68.2
          ASSET="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          # --fail/--retry: abort on a bad HTTP response instead of saving an error
          # page, and ride out transient CDN blips. See docs/DECISIONS.md ADR-010.
          DL="curl --fail --retry 3 --retry-delay 2 --retry-all-errors -sSL"
          $DL -o "${ASSET}" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${ASSET}"
          $DL -o checksums.txt "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/checksums.txt"
          grep " ${ASSET}\$" checksums.txt | sha256sum -c -
          tar -xzf "${ASSET}" conftest
          chmod +x conftest
          sudo mv conftest /usr/local/bin/conftest
          rm "${ASSET}" checksums.txt
          conftest --version

      - name: conftest — fixtures/clean/ must PASS
        run: conftest test --policy policy --data data --parser json fixtures/clean/*.sarif

      - name: conftest — fixtures/failing/ must be DENIED
        run: |
          set +e
          conftest test --policy policy --data data --parser json fixtures/failing/*.sarif
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 1 ]; then
            echo "ERROR: expected conftest to exit 1 (policy failures), got exit code $exit_code" >&2
            exit 1
          fi
          echo "OK: fixtures/failing/ correctly denied (exit code 1)"

  # ── Live security gates: real scanners → SARIF → conftest policy gate ──────
  # Four real scanners each run in their pinned official image, emit SARIF, and
  # never fail the build themselves (Trivy exit-code 0, Gitleaks --exit-code 0,
  # Semgrep non-error by default). The single conftest step is the sole
  # enforcement point: it denies on any HIGH+ finding lacking a valid, unexpired
  # exception (§7), so a real finding blocks the merge. Green on main; the
  # demo/failing-gates branch plants one finding per gate to prove each fires.
  # Trivy uses --ignore-unfixed so only actionable (fix-available) HIGH+ gates —
  # unfixable base-image OS CVEs do not perma-red main. IaC (Checkov) is wired in
  # M4 alongside infra/. See docs/DECISIONS.md ADR-011.
  security-gates:
    name: Security gates (live scanners → conftest)
    runs-on: ubuntu-latest
    needs: opa-policy-tests
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Prepare output dirs
        run: mkdir -p sarif sbom

      - name: SAST — Semgrep (p/python)
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep:1.168.0 \
            semgrep --config p/python --sarif --output sarif/semgrep.sarif app/

      - name: SCA — Trivy filesystem (dependencies)
        run: |
          docker run --rm -v "$PWD:/src" aquasec/trivy:0.72.0 fs \
            --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 \
            --format sarif --output /src/sarif/trivy-fs.sarif /src/app/requirements.txt

      - name: Secrets — Gitleaks (working tree)
        run: |
          # --no-git scans the checked-out files, not git history. History scanning
          # would flag the deliberately-planted fake secret on the demo/failing-gates
          # branch on *every* branch (gitleaks walks all reachable refs), reddening
          # clean branches. Scanning the working tree gates secrets present in the code
          # as it stands, which is what we want; historical-secret scanning is a
          # separate future concern. See docs/DECISIONS.md ADR-011.
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect \
            --source=/repo --no-git --report-format sarif \
            --report-path /repo/sarif/gitleaks.sarif --exit-code 0 --no-banner

      - name: Build image
        run: docker build -t devsecops-app:ci app/

      - name: Container — Trivy image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/src" \
            aquasec/trivy:0.72.0 image \
            --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 \
            --format sarif --output /src/sarif/trivy-image.sarif devsecops-app:ci

      - name: SBOM — Syft (CycloneDX of the built image)
        run: |
          # Per-build SBOM of the same devsecops-app:ci image the container gate
          # scanned. This is evidence, not a gate — Syft only fails on a real
          # tooling error, never on SBOM contents. Pinned official image, mirroring
          # the scanner discipline in ADR-011. See docs/DECISIONS.md ADR-014.
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/src" \
            anchore/syft:v1.46.0 devsecops-app:ci \
            -o cyclonedx-json=/src/sbom/sbom.cyclonedx.json

      - name: Upload SARIF (evidence)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sarif
          path: sarif/

      - name: Upload SBOM (evidence)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom/

      - name: Install conftest (pinned v0.68.2, checksum-verified)
        run: |
          set -euo pipefail
          CONFTEST_VERSION=0.68.2
          ASSET="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          DL="curl --fail --retry 3 --retry-delay 2 --retry-all-errors -sSL"
          $DL -o "${ASSET}" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${ASSET}"
          $DL -o checksums.txt "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/checksums.txt"
          grep " ${ASSET}\$" checksums.txt | sha256sum -c -
          tar -xzf "${ASSET}" conftest
          chmod +x conftest
          sudo mv conftest /usr/local/bin/conftest
          rm "${ASSET}" checksums.txt
          conftest --version

      - name: Policy gate — conftest over live SARIF (deny ⇒ merge blocked)
        run: conftest test --policy policy --data data --parser json sarif/*.sarif
