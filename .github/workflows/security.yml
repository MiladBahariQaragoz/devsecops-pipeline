# DevSecOps security pipeline
# M1: lint + test job (green on main)
# M2–M4: security gate stages are stubbed below with # TODO markers — add them incrementally.

name: security

on:
  push:
    branches: ["main", "demo/**", "feat/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint and test ──────────────────────────────────────────────────────────
  # Runs on every push and PR. Must be green on main.
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt ruff pytest
          pip install -e .

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-not-for-production
        run: pytest -q

