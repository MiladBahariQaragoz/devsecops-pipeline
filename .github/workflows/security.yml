# DevSecOps security pipeline
# M1: lint + test job (green on main)
# M2–M4: security gate stages are stubbed below with # TODO markers — add them incrementally.

name: security

on:
  push:
    branches: ["main", "demo/**", "feat/**"]
  pull_request:
    branches: ["main"]

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint and test ──────────────────────────────────────────────────────────
  # Runs on every push and PR. Must be green on main.
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "app/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt ruff pytest
          pip install -e .

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          FLASK_SECRET_KEY: ci-test-secret-not-for-production
        run: pytest -q

  # ── OPA/Rego policy unit tests ─────────────────────────────────────────────
  # opa test policy/ — the deterministic, offline core. See docs/DECISIONS.md
  # ADR-009 for the pinned-version + checksum-verification rationale.
  opa-policy-tests:
    name: OPA policy unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install OPA (pinned v1.18.2, checksum-verified)
        run: |
          set -euo pipefail
          OPA_VERSION=v1.18.2
          ASSET=opa_linux_amd64_static
          # --fail: a 4xx/5xx from the release CDN must abort, not silently save an
          # HTML error page that then fails checksum verification with a misleading
          # "no properly formatted checksum lines" error. --retry rides out transient
          # CDN blips. See docs/DECISIONS.md ADR-010.
          DL="curl --fail --retry 3 --retry-delay 2 --retry-all-errors -sSL"
          $DL -o "${ASSET}" "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/${ASSET}"
          $DL -o "${ASSET}.sha256" "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/${ASSET}.sha256"
          sha256sum -c "${ASSET}.sha256"
          chmod +x "${ASSET}"
          sudo mv "${ASSET}" /usr/local/bin/opa
          opa version

      - name: Run opa test
        run: opa test policy/ -v

  # ── conftest gate over committed SARIF fixtures (offline) ──────────────────
  # No live scanners, no network calls in the policy evaluation itself — proves
  # the decision point works before M3 wires any real scanner.
  conftest-fixtures:
    name: conftest gate (offline fixtures)
    runs-on: ubuntu-latest
    needs: opa-policy-tests
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install conftest (pinned v0.68.2, checksum-verified)
        run: |
          set -euo pipefail
          CONFTEST_VERSION=0.68.2
          ASSET="conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz"
          # --fail/--retry: abort on a bad HTTP response instead of saving an error
          # page, and ride out transient CDN blips. See docs/DECISIONS.md ADR-010.
          DL="curl --fail --retry 3 --retry-delay 2 --retry-all-errors -sSL"
          $DL -o "${ASSET}" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/${ASSET}"
          $DL -o checksums.txt "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/checksums.txt"
          grep " ${ASSET}\$" checksums.txt | sha256sum -c -
          tar -xzf "${ASSET}" conftest
          chmod +x conftest
          sudo mv conftest /usr/local/bin/conftest
          rm "${ASSET}" checksums.txt
          conftest --version

      - name: conftest — fixtures/clean/ must PASS
        run: conftest test --policy policy --data data --parser json fixtures/clean/*.sarif

      - name: conftest — fixtures/failing/ must be DENIED
        run: |
          set +e
          conftest test --policy policy --data data --parser json fixtures/failing/*.sarif
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 1 ]; then
            echo "ERROR: expected conftest to exit 1 (policy failures), got exit code $exit_code" >&2
            exit 1
          fi
          echo "OK: fixtures/failing/ correctly denied (exit code 1)"

