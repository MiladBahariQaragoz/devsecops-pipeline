[tool.ruff]
# Lint app/ and tests/ only; ignore infra/ (Terraform HCL, not Python)
include = ["app/**/*.py", "tests/**/*.py"]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "S",   # flake8-bandit (basic security rules)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "S101",  # assert used in tests — expected
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]  # asserts are fine in tests
